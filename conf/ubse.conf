[ubse.log]
# Log level. The value can be DEBUG, INFO (default value), WARN, ERROR, or CRIT. Any invalid value will be reset to INFO.
log.level=INFO
# Size of the log file to be wrapped, in MB. The value range is [2, 20]. Any invalid value will be reset to 20.
log.max.fileSize=20
# Maximum number of log files that can be wrapped. The value range is [1, 200]. Any invalid value will be reset to 20.
log.fileNums=20
# Maximum number of logs that can be cached in the log buffer. If the number of cached logs exceeds the value, the earliest logs are overwritten. Value range: [64,4096]. Any invalid value will be reset to 4096.
log.queue.maxItem=4096
# Syslog switch.The value can be true or false(default value). Any invalid value will be reset to false.
log.sys.open=false
# Syslog type.The value can be kern, user(default value), mail, daemon, auth, syslog, lpr, news, uucp, cron, authpriv, ftp, or local0~7. Any invalid value will be reset to user.
log.sys.type=user

[ubse.election]
# Interval at which the Master node sends heartbeat messages, in milliseconds. The value range is from 1000 to 60000. Any invalid value will be reset to 2000.
heartbeat.timeInterval=2000
# Threshold for the number of lost standby node heartbeats. The value ranges from 3 to 20. Any invalid value will default to 3.
heartbeat.lostThreshold=3
# Configure whether the current node participates in master election. The default value is true. Any illegal value will be considered as true.
election.candidate=true
# Configure whether the current node waits. The default value is true. Any illegal value will be considered as true.
election.wait=true

[ubse.rpc]
# The timeout for calling the rpc interface, in seconds, the default time is 60s. The value range is from 0 to 65535. Any invalid value will be reset to 60.
request.timeout=60
# When the communication mode is TCP, configure the IP addresses of all nodes within the cluster. Continuous IP address segments are supported, with segments separated by a hyphen (-).
# cluster.ipList=192.168.100.100-192.168.100.103
# Whether to enable TLS certificate authentication
# true: Enable TLS authentication and use certificates for secure communication
# false: Disable TLS authentication, communication will be unencrypted
cert.use=true

[ubse.ubfm]
# Port number of the https tcp server. The value range is [1024, 65535]. Any invalid value will be reset to 8082.
# ubse.server.port=8082
# Set the Port for Sending Messages to the UBM. The value range is [1024, 65535]. Any value out of range is reset to 8799
# The value must match the UBM listening port.
# ubm.server.port=8799
# This value must match the user-provided VM cid for vsock communication to work.
# ubm.server.cid=1
# Hostname verification configuration. The client will verify that TLS certificate contains this value in its Subject Alternative Name (SAN) or Common Name (CN) fields.
# Default value is "localhost". Any invalid or empty value will be reset to "localhost".
# ubm.server.hostname=localhost

[ubse.urma]
# Topology mode used when UBSE pushes topology to URMA UVS in CLOS networking.
# Valid values:
#   non-cross: local ports connect to the same chip and port on remote nodes.
#   hccs-cross: local ports connect to the same-plane ports across HCCS chips on remote nodes.
# This configuration takes effect only in CLOS networking. It is ignored in 1D-FULLMESH networking.
# Any invalid value will be reset to non-cross.
topo_mode=non-cross

[ubse.memory]
# Memory block size for chip table item allocation. The value must be within the range of 4 to 4096 MB and must be a power of 2.
# Any invalid value will be set to 128 (when the obmm allocator is buddy_highmem or hugetlb_pmd) or 1024 (when the obmm allocator is hugetlb_pud).
#obmm.memory.block.size=128
# This configuration item indicates whether the node can lend memory. When set to true, it can lend memory. Any invalid value will be considered as true.
isLender=true
# This configuration item indicates whether to enable pre online capabilities. When set to true, it can pre online. Any invalid value will be considered as false.
ubse.preonline.enable=false
# The size of the pre online memory, which is used in numa borrow. The size ranges from 128 to 262144, needs to be aligned with 128, unit is MB. Any value out of range is reset to 4096.
ubse.preonline.size=4096
# The timeout time for borrow API calls, in seconds, The value range is from 1 to 3600. Any invalid value will be reset to 1800.
api.timeout=1800
# Enable balance mode for lender NUMA selection 
# When true and resources permit, the algorithm prefers:
#   - Reusing the same lender NUMA node for a given borrowNode.
#   - Assigning different borrowNodes to different lender NUMA nodes.
# When false (default), reliability/availability is prioritized, and lender NUMA nodes may be shared.
# Default: false. Invalid values default to false.
# lender.balance=false
# Optional. If this item is not configured,  all nodes are by default in the same group, if configured as empty, it is equivalent to not being configured.
# If configured, this item specifies nodes that can lend memory to the node which is in same group. The host name of each node must be unique.
# Nodes within the same group can borrow from each other, using ";" as the delimiter between groups.
# The maximum number of hosts currently supported is determined by the statically planned number of nodes; a node is not allowed to be in multiple groups.
# group=host1,host2,host3,host7;host4,host5,host6,host8;
# Optional. If this item is not configured, all nodes are available for lending by default; if configured as empty, it is equivalent to not being configured.
# If configured, the specified node is dedicated for lending. The num of hosts must less than statically planned number of nodes.
# provider=host1,host2,host3,host4,host5,host6
# The memory borrowing radius for lender nodes. The value range is from 0 to 7. Any invalid value will be reset to 7. Only applicable to fd and numa borrowing scenarios.
# radius.lender=7
# The memory borrowing radius for borrower nodes. The value range is from 0 to 7. Any invalid value will be reset to 7. Only applicable to fd and numa borrowing scenarios.
# radius.borrow=7
# The timeout for obmm_unimport operation, in seconds. When configured, the timeout is fixed at this value.
# When not configured, the value is invalid, or out of range [10, 1800], the timeout is determined internally.
# obmm.memory.offline.timeout=100
