[ubse.log]
log.level=INFO
log.max.fileSize=30
 log.min.fileSize=1
log.fileNums=20
log.path=/home/log/
log.queue.maxItem=1024
[ubse.common]
nodeId=Node0
eid=127.0.0.1
[ubse.election]
role=Agent
[ubse.db]
[ubse.rpc]
# Maximum number of big data packets sent in communication scenarios, in MB. The value range is from 1M to 500M. Any invalid value will be reset to 5.
max.sendReceive.size=5
# The timeout for calling the rpc interface, in seconds, the default time is 60s.
request.timeout=60
